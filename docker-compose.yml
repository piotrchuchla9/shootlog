services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: shootlog
      POSTGRES_USER: shootlog
      POSTGRES_PASSWORD: shootlog_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shootlog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://shootlog:shootlog_dev@postgres:5432/shootlog
      REDIS_URL: redis://redis:6379
      PORT: 3000
      CORS_ORIGINS: http://localhost:8081
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
